<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Uploader un fichier</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #111110;
      color: #e8e8e4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #1c1c1a;
      border-radius: 16px;
      border: 0.5px solid rgba(255,255,255,0.1);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      color: #e8e8e4;
      margin-bottom: 1.5rem;
    }

    .drop-zone {
      border: 1.5px dashed rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      background: #252523;
    }
    .drop-zone:hover { border-color: #378ADD; background: #1a2a38; }
    .drop-zone.drag { border-color: #378ADD; background: #1a2a38; }
    .drop-zone.has-file { border-style: solid; border-color: rgba(255,255,255,0.2); }

    .drop-zone i { font-size: 36px; color: #888780; }
    .drop-zone p.main { margin: 10px 0 4px; font-size: 15px; color: #e8e8e4; }
    .drop-zone p.sub { font-size: 13px; color: #888780; }

    .file-name { font-size: 14px; font-weight: 500; color: #e8e8e4; margin: 10px 0 2px; }
    .file-size { font-size: 12px; color: #888780; }

    .preview-img {
      max-width: 100%;
      max-height: 180px;
      border-radius: 8px;
      margin-top: 12px;
      border: 0.5px solid rgba(255,255,255,0.1);
    }

    .progress-wrapper { margin-top: 14px; display: none; }
    .progress-header { display: flex; justify-content: space-between; font-size: 12px; color: #888780; margin-bottom: 6px; }
    .progress-track { width: 100%; height: 6px; background: #333331; border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: #378ADD; border-radius: 99px; transition: width 0.2s ease; }

    .btn-upload {
      width: 100%; margin-top: 14px; padding: 11px;
      border-radius: 10px; border: none;
      background: #378ADD; color: #fff;
      font-size: 15px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s;
    }
    .btn-upload:hover { opacity: 0.88; }
    .btn-upload:disabled { opacity: 0.3; cursor: not-allowed; }

    .result-box {
      margin-top: 14px; border-radius: 10px; padding: 14px 16px;
      font-size: 13px; display: none; word-break: break-all;
    }
    .result-box.success {
      background: #1a2d10;
      color: #97c459;
      border: 0.5px solid #3b6d11;
    }
    .result-box.error {
      background: #2d1010;
      color: #f09595;
      border: 0.5px solid #a32d2d;
    }

    .result-title { display: flex; align-items: center; gap: 8px; font-weight: 500; margin-bottom: 8px; font-size: 14px; }
    .result-url { color: #97c459; text-decoration: underline; }

    .copy-btn {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 10px; padding: 6px 12px;
      border-radius: 8px; border: 0.5px solid #3b6d11;
      background: transparent; color: #97c459;
      font-size: 12px; cursor: pointer; transition: background 0.1s;
    }
    .copy-btn:hover { background: #1f3a12; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Uploader un fichier</h1>

    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <i class="ti ti-upload" id="dropIcon" aria-hidden="true"></i>
      <p class="main">Glisse ton fichier ici</p>
      <p class="sub">PDF, PNG ou JPG — ou clique pour parcourir</p>
      <div id="fileInfo" style="display:none">
        <img id="previewImg" class="preview-img" style="display:none" alt="aperçu" />
        <p class="file-name" id="fileName"></p>
        <p class="file-size" id="fileSize"></p>
      </div>
    </div>
    <input type="file" id="fileInput" accept="application/pdf,image/png,image/jpeg" style="display:none" />

    <div class="progress-wrapper" id="progressWrapper">
      <div class="progress-header">
        <span id="progressLabel">Envoi en cours…</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <button class="btn-upload" id="uploadBtn" disabled>
      <i class="ti ti-upload" aria-hidden="true"></i> Envoyer
    </button>

    <div class="result-box" id="resultBox">
      <div id="resultContent"></div>
    </div>
  </div>

  <script>
    const API = 'https://ed-upload-wild-paper-72c3.edmondio.workers.dev/upload';
    const ALLOWED = ['application/pdf', 'image/png', 'image/jpeg'];
    let selectedFile = null;

    const dropZone = document.getElementById('dropZone');
    const dropIcon = document.getElementById('dropIcon');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const progressWrapper = document.getElementById('progressWrapper');
    const progressFill = document.getElementById('progressFill');
    const progressPct = document.getElementById('progressPct');
    const progressLabel = document.getElementById('progressLabel');
    const resultBox = document.getElementById('resultBox');
    const resultContent = document.getElementById('resultContent');
    const fileInfo = document.getElementById('fileInfo');
    const fileNameEl = document.getElementById('fileName');
    const fileSizeEl = document.getElementById('fileSize');
    const previewImg = document.getElementById('previewImg');

    function formatSize(bytes) {
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' Ko';
      return (bytes / (1024 * 1024)).toFixed(2) + ' Mo';
    }

    function setFile(file) {
      if (!file || !ALLOWED.includes(file.type)) {
        alert('Formats acceptés : PDF, PNG ou JPG.');
        return;
      }
      selectedFile = file;
      dropZone.classList.add('has-file');
      fileInfo.style.display = 'block';
      fileNameEl.textContent = file.name;
      fileSizeEl.textContent = formatSize(file.size);
      uploadBtn.disabled = false;
      resultBox.style.display = 'none';

      // aperçu image si PNG/JPG, sinon icône PDF
      if (file.type === 'image/png' || file.type === 'image/jpeg') {
        const reader = new FileReader();
        reader.onload = e => {
          previewImg.src = e.target.result;
          previewImg.style.display = 'block';
        };
        reader.readAsDataURL(file);
        dropIcon.className = 'ti ti-photo';
      } else {
        previewImg.style.display = 'none';
        previewImg.src = '';
        dropIcon.className = 'ti ti-file-type-pdf';
      }
    }

    fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag');
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });

    uploadBtn.addEventListener('click', () => {
      if (!selectedFile) return;

      const fd = new FormData();
      fd.append('file', selectedFile);
      const xhr = new XMLHttpRequest();

      progressWrapper.style.display = 'block';
      progressFill.style.width = '0%';
      progressPct.textContent = '0%';
      progressLabel.textContent = 'Envoi en cours…';
      uploadBtn.disabled = true;

      xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressFill.style.width = pct + '%';
          progressPct.textContent = pct + '%';
        }
      });

      xhr.addEventListener('load', () => {
        progressFill.style.width = '100%';
        progressPct.textContent = '100%';
        progressLabel.textContent = 'Terminé';
        uploadBtn.disabled = false;

        try {
          const data = JSON.parse(xhr.responseText);
          if (data.ok) {
            resultBox.className = 'result-box success';
            resultBox.style.display = 'block';
            resultContent.innerHTML = `
              <div class="result-title">
                <i class="ti ti-circle-check" style="font-size:18px"></i> Upload réussi
              </div>
              <a class="result-url" href="${data.url}" target="_blank">${data.url}</a>
              <br/>
              <button class="copy-btn" id="copyBtn">
                <i class="ti ti-copy"></i> Copier le lien
              </button>
            `;
            document.getElementById('copyBtn').addEventListener('click', function() {
              navigator.clipboard.writeText(data.url).then(() => {
                this.innerHTML = '<i class="ti ti-check"></i> Copié';
              });
            });
          } else {
            throw new Error(data.error || 'Échec upload');
          }
        } catch(e) {
          resultBox.className = 'result-box error';
          resultBox.style.display = 'block';
          resultContent.innerHTML = `<i class="ti ti-alert-circle" style="font-size:16px; vertical-align:-2px; margin-right:6px"></i> Erreur : ${e.message}`;
        }
      });

      xhr.addEventListener('error', () => {
        uploadBtn.disabled = false;
        resultBox.className = 'result-box error';
        resultBox.style.display = 'block';
        resultContent.innerHTML = '<i class="ti ti-alert-circle" style="font-size:16px; vertical-align:-2px; margin-right:6px"></i> Erreur réseau.';
      });

      xhr.open('POST', API);
      xhr.send(fd);
    });
  </script>
</body>
</html>
